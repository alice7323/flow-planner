<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowPlanner - Your Flexible Daily Companion</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --accent: #f59e0b;
            --success: #10b981;
            --bg: #fafafa;
            --card: #ffffff;
            --text: #1f2937;
            --text-light: #6b7280;
            --border: #e5e7eb;
            --shadow: rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #f0f4ff 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.6s ease-out;
        }

        .logo {
            font-family: 'Caveat', cursive;
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .tagline {
            font-size: 1.1rem;
            color: var(--text-light);
            font-weight: 400;
        }

        /* Dashboard Grid */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 24px;
            margin-bottom: 30px;
        }

        @media (max-width: 968px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }

        /* Card Styles */
        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 4px 20px var(--shadow);
            animation: fadeInUp 0.6s ease-out;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px var(--shadow);
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(180deg, var(--primary), var(--accent));
            border-radius: 2px;
        }

        /* Quick Add Form */
        .quick-add {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-group {
            display: flex;
            gap: 8px;
        }

        input[type="text"],
        input[type="time"],
        textarea {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.3s ease;
            background: var(--bg);
        }

        input[type="text"]:focus,
        input[type="time"]:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'DM Sans', sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* Visual Summary */
        .summary {
            animation-delay: 0.2s;
        }

        .summary-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .stat-card.success {
            background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
        }

        .stat-card.accent {
            background: linear-gradient(135deg, var(--accent) 0%, #d97706 100%);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            font-family: 'Caveat', cursive;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.95;
            font-weight: 500;
        }

        .progress-bar-container {
            background: var(--border);
            border-radius: 12px;
            height: 12px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--success) 0%, #34d399 100%);
            border-radius: 12px;
            transition: width 0.6s ease;
            position: relative;
            overflow: hidden;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }

        .progress-text {
            font-size: 0.9rem;
            color: var(--text-light);
            text-align: center;
        }

        /* Tasks Section */
        .tasks-section {
            animation-delay: 0.1s;
        }

        .tasks-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .filter-chips {
            display: flex;
            gap: 8px;
        }

        .chip {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            border: 2px solid var(--border);
            background: white;
            transition: all 0.2s ease;
        }

        .chip:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .chip.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .tasks-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .task-item {
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.3s ease;
            cursor: pointer;
            animation: slideIn 0.4s ease-out;
        }

        .task-item:hover {
            border-color: var(--primary-light);
            transform: translateX(4px);
            background: white;
        }

        .task-item.completed {
            opacity: 0.6;
            background: rgba(16, 185, 129, 0.05);
            border-color: var(--success);
        }

        .task-checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid var(--primary);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }

        .task-checkbox:hover {
            background: rgba(99, 102, 241, 0.1);
        }

        .task-checkbox.checked {
            background: var(--success);
            border-color: var(--success);
        }

        .task-checkbox.checked::after {
            content: '✓';
            color: white;
            font-size: 14px;
            font-weight: bold;
        }

        .task-content {
            flex: 1;
        }

        .task-title {
            font-weight: 500;
            margin-bottom: 4px;
            color: var(--text);
        }

        .task-item.completed .task-title {
            text-decoration: line-through;
        }

        .task-time {
            font-size: 0.85rem;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .task-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            cursor: pointer;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            font-size: 1.2rem;
        }

        .icon-btn:hover {
            background: var(--border);
        }

        .icon-btn.delete:hover {
            background: #fee;
            color: #dc2626;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .logo {
                font-size: 2.5rem;
            }

            .dashboard {
                grid-template-columns: 1fr;
            }

            .summary-stats {
                grid-template-columns: 1fr;
            }

            .card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">FlowPlanner</div>
            <div class="tagline">Your flexible companion for an organized life ✨</div>
        </div>

        <!-- Dashboard -->
        <div class="dashboard">
            <!-- Main Content -->
            <div class="tasks-section card">
                <div class="tasks-header">
                    <h2 class="card-title">Today's Flow</h2>
                    <div class="filter-chips">
                        <span class="chip active" data-filter="all">All</span>
                        <span class="chip" data-filter="pending">Pending</span>
                        <span class="chip" data-filter="completed">Done</span>
                    </div>
                </div>
                <div class="tasks-list" id="tasksList">
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <p>No tasks yet! Add your first plan above.</p>
                    </div>
                </div>
            </div>

            <!-- Sidebar -->
            <div>
                <!-- Quick Add -->
                <div class="card">
                    <h2 class="card-title">Quick Add</h2>
                    <form class="quick-add" id="taskForm">
                        <input 
                            type="text" 
                            id="taskTitle" 
                            placeholder="What do you want to do?" 
                            required
                        >
                        <div class="input-group">
                            <input 
                                type="time" 
                                id="taskTime"
                                placeholder="Time (optional)"
                            >
                        </div>
                        <textarea 
                            id="taskNotes" 
                            placeholder="Any notes? (optional)"
                        ></textarea>
                        <button type="submit" class="btn btn-primary">Add to Flow</button>
                    </form>
                </div>

                <!-- Visual Summary -->
                <div class="card summary">
                    <h2 class="card-title">Your Day at a Glance</h2>
                    <div class="summary-stats">
                        <div class="stat-card">
                            <div class="stat-number" id="totalTasks">0</div>
                            <div class="stat-label">Total Plans</div>
                        </div>
                        <div class="stat-card success">
                            <div class="stat-number" id="completedTasks">0</div>
                            <div class="stat-label">Completed</div>
                        </div>
                        <div class="stat-card accent">
                            <div class="stat-number" id="pendingTasks">0</div>
                            <div class="stat-label">To Do</div>
                        </div>
                        <div class="stat-card" style="background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);">
                            <div class="stat-number" id="progressPercent">0%</div>
                            <div class="stat-label">Progress</div>
                        </div>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="progressBar" style="width: 0%"></div>
                    </div>
                    <div class="progress-text" id="progressText">Keep going! You're doing great!</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // State Management
        let tasks = JSON.parse(localStorage.getItem('flowplanner_tasks')) || [];
        let currentFilter = 'all';

        // DOM Elements
        const taskForm = document.getElementById('taskForm');
        const tasksList = document.getElementById('tasksList');
        const filterChips = document.querySelectorAll('.chip');

        // Initialize
        renderTasks();
        updateStats();

        // Event Listeners
        taskForm.addEventListener('submit', (e) => {
            e.preventDefault();
            addTask();
        });

        filterChips.forEach(chip => {
            chip.addEventListener('click', () => {
                filterChips.forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                currentFilter = chip.dataset.filter;
                renderTasks();
            });
        });

        // Functions
        function addTask() {
            const title = document.getElementById('taskTitle').value.trim();
            const time = document.getElementById('taskTime').value;
            const notes = document.getElementById('taskNotes').value.trim();

            if (!title) return;

            const task = {
                id: Date.now(),
                title,
                time,
                notes,
                completed: false,
                createdAt: new Date().toISOString()
            };

            tasks.unshift(task);
            saveTasks();
            renderTasks();
            updateStats();
            taskForm.reset();
        }

        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveTasks();
                renderTasks();
                updateStats();
            }
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveTasks();
            renderTasks();
            updateStats();
        }

        function renderTasks() {
            const filteredTasks = tasks.filter(task => {
                if (currentFilter === 'all') return true;
                if (currentFilter === 'completed') return task.completed;
                if (currentFilter === 'pending') return !task.completed;
                return true;
            });

            if (filteredTasks.length === 0) {
                tasksList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">
                            ${currentFilter === 'completed' ? '🎉' : currentFilter === 'pending' ? '⏰' : '📝'}
                        </div>
                        <p>${getEmptyMessage()}</p>
                    </div>
                `;
                return;
            }

            tasksList.innerHTML = filteredTasks.map(task => `
                <div class="task-item ${task.completed ? 'completed' : ''}" data-id="${task.id}">
                    <div class="task-checkbox ${task.completed ? 'checked' : ''}" 
                         onclick="toggleTask(${task.id})">
                    </div>
                    <div class="task-content">
                        <div class="task-title">${task.title}</div>
                        <div class="task-time">
                            ${task.time ? `⏰ ${formatTime(task.time)}` : ''}
                            ${task.notes ? `<span style="margin-left: 8px;">💭 ${task.notes}</span>` : ''}
                        </div>
                    </div>
                    <div class="task-actions">
                        <button class="icon-btn delete" onclick="deleteTask(${task.id})" title="Delete">
                            🗑️
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const pending = total - completed;
            const progress = total > 0 ? Math.round((completed / total) * 100) : 0;

            document.getElementById('totalTasks').textContent = total;
            document.getElementById('completedTasks').textContent = completed;
            document.getElementById('pendingTasks').textContent = pending;
            document.getElementById('progressPercent').textContent = progress + '%';
            document.getElementById('progressBar').style.width = progress + '%';

            const progressText = document.getElementById('progressText');
            if (progress === 0) {
                progressText.textContent = "Let's get started! Add your first task.";
            } else if (progress < 30) {
                progressText.textContent = "Great start! Keep the momentum going!";
            } else if (progress < 60) {
                progressText.textContent = "You're making solid progress!";
            } else if (progress < 100) {
                progressText.textContent = "Almost there! You've got this!";
            } else {
                progressText.textContent = "Amazing! You completed everything! 🎉";
            }
        }

        function getEmptyMessage() {
            if (currentFilter === 'completed') return "No completed tasks yet. Start checking things off!";
            if (currentFilter === 'pending') return "Nothing pending! You're all caught up!";
            return "No tasks yet! Add your first plan above.";
        }

        function formatTime(time) {
            if (!time) return '';
            const [hours, minutes] = time.split(':');
            const hour = parseInt(hours);
            const ampm = hour >= 12 ? 'PM' : 'AM';
            const displayHour = hour % 12 || 12;
            return `${displayHour}:${minutes} ${ampm}`;
        }

        function saveTasks() {
            localStorage.setItem('flowplanner_tasks', JSON.stringify(tasks));
        }
    </script>
</body>
</html>
